[package]
name = "react-native-gpui"
version = "0.1.0"
edition = "2024"

[lib]
name = "react_native_gpui"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib", "staticlib"]

[[bin]]
name = "rngpui-demo"
path = "src/main.rs"
[[bin]]
name = "rngpui-service"
path = "src/service.rs"

[dependencies]
gpui = "0.2.2"
gpui-macros = "0.2.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
logforth = "0.18"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "time"] }
thiserror = "2"
anyhow = "1.0"
once_cell = "1.20"
